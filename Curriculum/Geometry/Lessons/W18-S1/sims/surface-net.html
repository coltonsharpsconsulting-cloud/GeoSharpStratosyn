<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Surface Area of Solids — Sim</title>
<style>
  :root{--void:#0d1322;--ink:#161d31;--bone:#e8ecf3;--mist:#9aabd0;--accent:#8b5cf6;--gold:#f5c842;--cyan:#00e5ff;--border:#2a3142;--good:#7ee081}
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{background:var(--void);color:var(--bone);font-family:Inter,system-ui,sans-serif;display:flex;flex-direction:column;min-height:100%}
  header{padding:2vh 4vw;border-bottom:1px solid var(--border);background:var(--ink)}
  .eyebrow{font-family:"DM Mono",ui-monospace,monospace;letter-spacing:.18em;text-transform:uppercase;font-size:12px;color:var(--accent)}
  h1{font-family:Fraunces,Georgia,serif;font-style:italic;font-weight:600;font-size:clamp(20px,3vw,30px);margin-top:.3rem}
  main{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1.6vh;padding:3vh 4vw}
  .stage{width:100%;max-width:720px;aspect-ratio:16/11;background:var(--ink);border:1px solid var(--border);border-radius:16px;touch-action:none;overflow:hidden}
  svg{width:100%;height:100%;display:block}
  .controls{display:flex;gap:.6rem;flex-wrap:wrap;justify-content:center}
  button{font-family:"DM Mono",ui-monospace,monospace;font-size:14px;background:var(--ink);color:var(--bone);border:1px solid var(--border);border-radius:999px;padding:.6rem 1.2rem;cursor:pointer}
  button.on{border-color:var(--accent);color:var(--accent)}
  button.fold{border-color:var(--good);color:var(--good)}
  .sliders{width:100%;max-width:560px;display:flex;flex-direction:column;gap:.7rem}
  .slider-row{display:flex;align-items:center;gap:.8rem}
  .slider-row label{font-family:"DM Mono",ui-monospace,monospace;font-size:13px;color:var(--mist);width:150px;flex-shrink:0}
  .slider-row label b{color:var(--gold)}
  .slider-row.cyan label b{color:var(--cyan)}
  input[type=range]{flex:1;accent-color:var(--gold)}
  .slider-row.cyan input[type=range]{accent-color:var(--cyan)}
  .readout{font-family:"DM Mono",ui-monospace,monospace;font-size:clamp(13px,2vw,18px);color:var(--mist);text-align:center;min-height:4.5em;line-height:1.5}
  .readout b{color:var(--gold);font-size:1.1em}
  .hint{color:var(--mist);font-size:14px;max-width:60ch;text-align:center}
</style>
</head>
<body>
  <header>
    <div class="eyebrow">Geometry · Lesson 16 · sim</div>
    <h1>Unfold it flat. Add up every face.</h1>
  </header>
  <main>
    <div class="controls" id="modes">
      <button data-mode="box" class="on">Box</button>
      <button data-mode="cylinder">Cylinder</button>
    </div>
    <div class="stage"><svg viewBox="0 0 640 400" id="svg"></svg></div>
    <div class="controls">
      <button id="foldToggle">Unfold to Net →</button>
    </div>
    <div class="sliders" id="boxSliders">
      <div class="slider-row"><label>length ℓ = <b id="lVal">4</b></label><input type="range" id="lRange" min="1" max="10" step="1" value="4"></div>
      <div class="slider-row"><label>width w = <b id="wVal">3</b></label><input type="range" id="wRange" min="1" max="10" step="1" value="3"></div>
      <div class="slider-row cyan"><label>height h = <b id="hVal">2</b></label><input type="range" id="hRange" min="1" max="10" step="1" value="2"></div>
    </div>
    <div class="sliders" id="cylSliders" hidden>
      <div class="slider-row"><label>radius r = <b id="rVal">3</b></label><input type="range" id="rRange" min="1" max="6" step="1" value="3"></div>
      <div class="slider-row cyan"><label>height h = <b id="chVal">5</b></label><input type="range" id="chRange" min="1" max="10" step="1" value="5"></div>
    </div>
    <div class="readout" id="readout"></div>
    <p class="hint" id="hint"></p>
  </main>
<script>
(() => {
  const NS = 'http://www.w3.org/2000/svg';
  const svg = document.getElementById('svg');
  const readout = document.getElementById('readout');
  const hint = document.getElementById('hint');
  const boxSliders = document.getElementById('boxSliders');
  const cylSliders = document.getElementById('cylSliders');
  const foldToggle = document.getElementById('foldToggle');

  function make(tag, attrs){ const n=document.createElementNS(NS,tag); for(const k in attrs) n.setAttribute(k,attrs[k]); svg.appendChild(n); return n; }
  function clear(){ while (svg.firstChild) svg.removeChild(svg.firstChild); }
  function fmt(n){ return (Math.round(n*100)/100).toString().replace(/\.?0+$/,'').replace(/^$/,'0'); }

  const SOLID_UNIT = 26;    // px per unit, oblique solid view (tuned for sliders up to 10)
  const NET_UNIT_BOX = 11;  // px per unit, box net (tuned so the cross-net fits at max slider values)
  const NET_UNIT_CYL = 10;  // px per unit, cylinder net (tuned so the label + caps fit at max slider values)
  const ORIGIN = { x: 190, y: 300 };       // front-bottom-left reference corner, solid view
  const DEPTH_ANGLE = 35 * Math.PI / 180;  // oblique depth angle
  const DEPTH_SCALE = 0.62;                // foreshorten the depth axis (cabinet-style projection)

  let mode = 'box';        // 'box' | 'cylinder'
  let unfolded = false;    // false = solid view, true = net view
  let L = 4, W = 3, H = 2; // box dimensions (units)
  let R = 3, CH = 5;       // cylinder radius + height (units)

  function drawGrid(){
    const g = make('g', {});
    for (let x = 0; x <= 640; x += 20){
      const ln = document.createElementNS(NS,'line');
      ln.setAttribute('x1',x); ln.setAttribute('y1',0); ln.setAttribute('x2',x); ln.setAttribute('y2',400);
      ln.setAttribute('stroke','#1c2338'); ln.setAttribute('stroke-width', x % 100 === 0 ? 1.2 : 0.6);
      g.appendChild(ln);
    }
    for (let y = 0; y <= 400; y += 20){
      const ln = document.createElementNS(NS,'line');
      ln.setAttribute('x1',0); ln.setAttribute('y1',y); ln.setAttribute('x2',640); ln.setAttribute('y2',y);
      ln.setAttribute('stroke','#1c2338'); ln.setAttribute('stroke-width', y % 100 === 0 ? 1.2 : 0.6);
      g.appendChild(ln);
    }
  }

  function poly(pts, fill, stroke){
    return make('polygon', { points: pts.map(p => `${p.x},${p.y}`).join(' '), fill, stroke, 'stroke-width': 2.5, 'stroke-linejoin':'round' });
  }
  function rect(x, y, w, h, fill, stroke){
    return make('rect', { x, y, width:w, height:h, fill, stroke, 'stroke-width':2.5, 'stroke-linejoin':'round' });
  }
  function lineSeg(a, b, stroke, width, dash){
    const attrs = { x1:a.x, y1:a.y, x2:b.x, y2:b.y, stroke, 'stroke-width': width || 2 };
    if (dash) attrs['stroke-dasharray'] = dash;
    return make('line', attrs);
  }
  function label(x, y, text, opts){
    const t = make('text', Object.assign({ x, y, 'text-anchor':'middle', 'font-family':'DM Mono, monospace', 'font-size':14, fill:'#e8ecf3' }, opts||{}));
    t.textContent = text;
    return t;
  }
  function faceLabel(cx, cy, name, formula, opts){
    label(cx, cy - 6, name, Object.assign({ 'font-size':13, fill:'#c7cfe4' }, opts||{}));
    label(cx, cy + 12, formula, Object.assign({ 'font-size':13, fill:'#f5c842' }, opts||{}));
  }

  // ================= BOX =================

  function drawBoxSolid(){
    const A  = { x: ORIGIN.x, y: ORIGIN.y };
    const B  = { x: ORIGIN.x + L*SOLID_UNIT, y: ORIGIN.y };
    const Ap = { x: ORIGIN.x, y: ORIGIN.y - H*SOLID_UNIT };
    const Bp = { x: ORIGIN.x + L*SOLID_UNIT, y: ORIGIN.y - H*SOLID_UNIT };
    const dx = W*SOLID_UNIT*DEPTH_SCALE*Math.cos(DEPTH_ANGLE);
    const dy = -W*SOLID_UNIT*DEPTH_SCALE*Math.sin(DEPTH_ANGLE);
    const A2  = { x: A.x + dx, y: A.y + dy };
    const B2  = { x: B.x + dx, y: B.y + dy };
    const A2p = { x: Ap.x + dx, y: Ap.y + dy };
    const B2p = { x: Bp.x + dx, y: Bp.y + dy };

    lineSeg(A2, A2p, '#3a4258', 1.5, '4 4');
    lineSeg(A2, B2, '#3a4258', 1.5, '4 4');
    lineSeg(A2, A, '#3a4258', 1.5, '4 4');

    poly([Ap, Bp, B2p, A2p], '#8b5cf655', '#8b5cf6'); // top
    poly([B, Bp, B2p, B2], '#8b5cf633', '#8b5cf6');   // right side
    poly([A, B, Bp, Ap], '#8b5cf680', '#8b5cf6');     // front

    [A, B, Ap, Bp, B2, B2p].forEach(p => make('circle', { cx:p.x, cy:p.y, r:4, fill:'#f5c842' }));

    label((A.x + B.x)/2, A.y + 26, `ℓ = ${fmt(L)}`, { fill:'#f5c842' });
    label(A.x - 22, (A.y + Ap.y)/2, `h = ${fmt(H)}`, { fill:'#00e5ff', 'text-anchor':'end' });
    label((A.x + A2.x)/2 - 6, (A.y + A2.y)/2 - 8, `w = ${fmt(W)}`, { fill:'#f5c842' });
  }

  function drawBoxNet(){
    const U = NET_UNIT_BOX;
    const lp = L*U, wp = W*U, hp = H*U;
    const totalW = 2*wp + 2*lp;
    const totalH = 2*wp + hp;
    const x0 = 320 - totalW/2;
    const y0 = 200 - totalH/2;

    const leftX = x0, frontX = x0 + wp, rightX = x0 + wp + lp, backX = x0 + 2*wp + lp;
    const midY = y0 + wp;

    // side faces (left, front, right, back) — all height hp
    rect(leftX,  midY, wp, hp, '#8b5cf633', '#8b5cf6');
    rect(frontX, midY, lp, hp, '#8b5cf680', '#8b5cf6');
    rect(rightX, midY, wp, hp, '#8b5cf633', '#8b5cf6');
    rect(backX,  midY, lp, hp, '#8b5cf655', '#8b5cf6');
    // top + bottom faces, attached above/below the front face
    rect(frontX, y0,        lp, wp, '#8b5cf655', '#8b5cf6');
    rect(frontX, midY + hp, lp, wp, '#8b5cf655', '#8b5cf6');

    faceLabel(leftX + wp/2,  midY + hp/2, 'left',   `${fmt(W)}×${fmt(H)} = ${fmt(W*H)}`);
    faceLabel(frontX + lp/2, midY + hp/2, 'front',  `${fmt(L)}×${fmt(H)} = ${fmt(L*H)}`);
    faceLabel(rightX + wp/2, midY + hp/2, 'right',  `${fmt(W)}×${fmt(H)} = ${fmt(W*H)}`);
    faceLabel(backX + lp/2,  midY + hp/2, 'back',   `${fmt(L)}×${fmt(H)} = ${fmt(L*H)}`);
    faceLabel(frontX + lp/2, y0 + wp/2,   'top',    `${fmt(L)}×${fmt(W)} = ${fmt(L*W)}`);
    faceLabel(frontX + lp/2, midY + hp + wp/2, 'bottom', `${fmt(L)}×${fmt(W)} = ${fmt(L*W)}`);
  }

  function readoutBox(){
    const top = L*W, front = L*H, side = W*H;
    const total = 2*top + 2*front + 2*side;
    if (unfolded){
      return `Rectangular solid net &middot; ℓ = <b>${fmt(L)}</b> &middot; w = <b>${fmt(W)}</b> &middot; h = <b>${fmt(H)}</b><br>` +
        `2 &times; (top/bottom, ℓ&middot;w = ${fmt(top)}) + 2 &times; (front/back, ℓ&middot;h = ${fmt(front)}) + 2 &times; (sides, w&middot;h = ${fmt(side)})<br>` +
        `= ${fmt(2*top)} + ${fmt(2*front)} + ${fmt(2*side)} = <b>${fmt(total)}</b> sq units`;
    }
    return `Rectangular solid &middot; ℓ = <b>${fmt(L)}</b> &middot; w = <b>${fmt(W)}</b> &middot; h = <b>${fmt(H)}</b><br>` +
      `SA = 2(ℓw + ℓh + wh) = 2(${fmt(top)} + ${fmt(front)} + ${fmt(side)}) = <b>${fmt(total)}</b> sq units<br>` +
      `Press "Unfold to Net" to see all six faces.`;
  }

  // ================= CYLINDER =================

  function drawCylinderSolid(){
    const cx = 320;
    const rx = R*SOLID_UNIT, ry = R*SOLID_UNIT*0.4;
    const topY = 90, botY = topY + CH*SOLID_UNIT;

    make('path', { d:`M ${cx-rx} ${botY} A ${rx} ${ry} 0 0 1 ${cx+rx} ${botY}`, fill:'none', stroke:'#3a4258', 'stroke-width':1.5, 'stroke-dasharray':'4 4' });
    poly([{x:cx-rx,y:topY},{x:cx+rx,y:topY},{x:cx+rx,y:botY},{x:cx-rx,y:botY}], '#8b5cf655', '#8b5cf6');
    make('path', { d:`M ${cx-rx} ${botY} A ${rx} ${ry} 0 0 0 ${cx+rx} ${botY}`, fill:'#8b5cf655', stroke:'#8b5cf6', 'stroke-width':2.5 });
    make('ellipse', { cx, cy:topY, rx, ry, fill:'#8b5cf680', stroke:'#8b5cf6', 'stroke-width':2.5 });

    lineSeg({x:cx,y:topY}, {x:cx+rx,y:topY}, '#f5c842', 3);
    make('circle', { cx:cx+rx, cy:topY, r:5, fill:'#f5c842' });
    make('circle', { cx, cy:topY, r:4, fill:'#f5c842' });
    lineSeg({x:cx-rx-18,y:topY}, {x:cx-rx-18,y:botY}, '#00e5ff', 2, '6 5');

    label(cx + rx/2, topY - 10, `r = ${fmt(R)}`, { fill:'#f5c842' });
    label(cx-rx-30, (topY+botY)/2, `h = ${fmt(CH)}`, { fill:'#00e5ff', 'text-anchor':'end' });
  }

  function drawCylinderNet(){
    const U = NET_UNIT_CYL;
    const rectW = 2*Math.PI*R*U, rectH = CH*U, capR = R*U;
    const totalH = rectH + 4*capR;
    const cx = 320;
    const y0 = 200 - totalH/2;
    const topCapCy = y0 + capR;
    const rectY0 = y0 + 2*capR, rectY1 = rectY0 + rectH;
    const botCapCy = rectY1 + capR;
    const rectX0 = cx - rectW/2;

    make('circle', { cx, cy:topCapCy, r:capR, fill:'#8b5cf655', stroke:'#8b5cf6', 'stroke-width':2.5 });
    rect(rectX0, rectY0, rectW, rectH, '#8b5cf680', '#8b5cf6');
    make('circle', { cx, cy:botCapCy, r:capR, fill:'#8b5cf655', stroke:'#8b5cf6', 'stroke-width':2.5 });

    faceLabel(cx, topCapCy, 'top base', `&pi;r&sup2; = ${fmt(R*R)}&pi;`);
    faceLabel(cx, botCapCy, 'bottom base', `&pi;r&sup2; = ${fmt(R*R)}&pi;`);
    faceLabel(cx, rectY0 + rectH/2, 'unrolled side', `2&pi;r&middot;h = ${fmt(2*R*CH)}&pi;`);
    label(cx, rectY0 - 8, `width = circumference = 2&pi;r = ${fmt(2*R)}&pi;`, { 'font-size':12, fill:'#9aabd0' });
  }

  function readoutCyl(){
    const twoBaseCoeff = 2*R*R;   // coefficient of π for the two circles
    const lateralCoeff = 2*R*CH;  // coefficient of π for the unrolled rectangle
    const totalCoeff = twoBaseCoeff + lateralCoeff;
    const totalVal = totalCoeff * Math.PI;
    if (unfolded){
      return `Cylinder net &middot; r = <b>${fmt(R)}</b> &middot; h = <b>${fmt(CH)}</b><br>` +
        `2 circles: 2&times;&pi;r&sup2; = 2&pi;(${fmt(R)})&sup2; = ${fmt(twoBaseCoeff)}&pi;<br>` +
        `unrolled rectangle: 2&pi;r&middot;h = 2&pi;(${fmt(R)})(${fmt(CH)}) = ${fmt(lateralCoeff)}&pi;<br>` +
        `Total SA = ${fmt(twoBaseCoeff)}&pi; + ${fmt(lateralCoeff)}&pi; = ${fmt(totalCoeff)}&pi; &asymp; <b>${fmt(totalVal)}</b> sq units`;
    }
    return `Cylinder &middot; r = <b>${fmt(R)}</b> &middot; h = <b>${fmt(CH)}</b><br>` +
      `SA = 2&pi;r&sup2; + 2&pi;r&middot;h = ${fmt(twoBaseCoeff)}&pi; + ${fmt(lateralCoeff)}&pi; = ${fmt(totalCoeff)}&pi; &asymp; <b>${fmt(totalVal)}</b> sq units<br>` +
      `Press "Unfold to Net" to see the two circles and the wrapped rectangle.`;
  }

  // ================= DRIVER =================

  function draw(){
    clear();
    drawGrid();
    if (mode === 'box') {
      if (unfolded) drawBoxNet(); else drawBoxSolid();
      readout.innerHTML = readoutBox();
    } else {
      if (unfolded) drawCylinderNet(); else drawCylinderSolid();
      readout.innerHTML = readoutCyl();
    }
    updateHint();
  }

  function updateHint(){
    if (mode === 'box'){
      hint.textContent = unfolded
        ? 'Each rectangle is one face of the box: two matching top/bottom, two matching front/back, and two matching sides. Add all six areas for the total surface area.'
        : 'Drag the length, width, and height sliders, then press "Unfold to Net" to see all six faces laid flat and watch their areas add up.';
    } else {
      hint.textContent = unfolded
        ? 'The curved side unrolls into a rectangle whose width is the base\'s circumference (2πr) and whose height is the cylinder\'s height — plus the two circular bases, each πr².'
        : 'Drag the radius and height sliders, then press "Unfold to Net" to see the two circular bases and the rectangle the curved side unrolls into.';
    }
  }

  function setMode(m){
    mode = m;
    unfolded = false;
    foldToggle.textContent = 'Unfold to Net →';
    [...document.querySelectorAll('#modes button')].forEach(b => b.classList.toggle('on', b.dataset.mode === m));
    boxSliders.hidden = m !== 'box';
    cylSliders.hidden = m !== 'cylinder';
    draw();
  }

  document.getElementById('lRange').addEventListener('input', e => { L = +e.target.value; document.getElementById('lVal').textContent = fmt(L); draw(); });
  document.getElementById('wRange').addEventListener('input', e => { W = +e.target.value; document.getElementById('wVal').textContent = fmt(W); draw(); });
  document.getElementById('hRange').addEventListener('input', e => { H = +e.target.value; document.getElementById('hVal').textContent = fmt(H); draw(); });
  document.getElementById('rRange').addEventListener('input', e => { R = +e.target.value; document.getElementById('rVal').textContent = fmt(R); draw(); });
  document.getElementById('chRange').addEventListener('input', e => { CH = +e.target.value; document.getElementById('chVal').textContent = fmt(CH); draw(); });

  document.getElementById('modes').addEventListener('click', e => { const m = e.target.dataset.mode; if (m) setMode(m); });
  foldToggle.addEventListener('click', () => {
    unfolded = !unfolded;
    foldToggle.textContent = unfolded ? '← Fold to Solid' : 'Unfold to Net →';
    foldToggle.classList.toggle('on', unfolded);
    draw();
  });

  setMode('box');
})();
</script>
</body>
</html>
