<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Postulates, Theorems & Angle Relationships — Sim</title>
<style>
  :root{--void:#0d1322;--ink:#161d31;--bone:#e8ecf3;--mist:#9aabd0;--accent:#8b5cf6;--gold:#f5c842;--border:#2a3142;--good:#7ee081}
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{background:var(--void);color:var(--bone);font-family:Inter,system-ui,sans-serif;display:flex;flex-direction:column;min-height:100%}
  header{padding:2vh 4vw;border-bottom:1px solid var(--border);background:var(--ink)}
  .eyebrow{font-family:"DM Mono",ui-monospace,monospace;letter-spacing:.18em;text-transform:uppercase;font-size:12px;color:var(--accent)}
  h1{font-family:Fraunces,Georgia,serif;font-style:italic;font-weight:600;font-size:clamp(20px,3vw,30px);margin-top:.3rem}
  main{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1.4vh;padding:3vh 4vw}
  .stage{width:100%;max-width:760px;aspect-ratio:16/10;background:var(--ink);border:1px solid var(--border);border-radius:16px;touch-action:none}
  .stage[hidden]{display:none}
  svg{width:100%;height:100%;display:block}
  .controls{display:flex;gap:.5rem;flex-wrap:wrap;justify-content:center}
  button{font-family:"DM Mono",ui-monospace,monospace;font-size:13px;background:var(--ink);color:var(--bone);border:1px solid var(--border);border-radius:999px;padding:.55rem 1.1rem;cursor:pointer}
  button.on{border-color:var(--accent);color:var(--accent)}
  .readout{font-family:"DM Mono",ui-monospace,monospace;font-size:clamp(12.5px,1.8vw,16px);color:var(--mist);text-align:center;min-height:6.6em;line-height:1.55;max-width:680px}
  .readout b{color:var(--gold)}
  .readout .rule{color:var(--good);font-weight:bold}
  .readout .postulate{color:var(--gold);font-weight:bold}
  .readout .note{color:var(--bone);margin-top:.3em}
  .hint{color:var(--mist);font-size:13.5px;max-width:64ch;text-align:center}
</style>
</head>
<body>
  <header>
    <div class="eyebrow">Geometry · Lesson 22 · sim</div>
    <h1>Which rule proves it? Drag and watch the name light up.</h1>
  </header>
  <main>
    <div class="controls" id="modes">
      <button data-mode="cross" class="on">Two Crossing Lines</button>
      <button data-mode="parallel">Parallel Lines + Transversal</button>
    </div>

    <div class="stage" id="stageCross"><svg viewBox="0 0 640 400" id="svgCross"></svg></div>
    <div class="stage" id="stageParallel" hidden><svg viewBox="0 0 640 400" id="svgParallel"></svg></div>

    <div class="readout" id="readout"></div>

    <div class="controls" id="actions">
      <button id="snap90">Snap to 90°</button>
      <button id="randomize">Randomize</button>
    </div>
    <p class="hint" id="hint"></p>
  </main>
<script>
(() => {
  const GOLD = '#f5c842', GREEN = '#7ee081', ACCENT = '#8b5cf6', STEEL = '#5c6685', BONE = '#e8ecf3';
  const readout = document.getElementById('readout');
  const hint = document.getElementById('hint');
  const rad = d => d * Math.PI / 180;

  function arrow(x, y, ux, uy, color){
    const tipX = x + ux*13, tipY = y + uy*13;
    const px = -uy*7, py = ux*7;
    return `<path d="M${x+px} ${y+py} L${tipX} ${tipY} L${x-px} ${y-py} Z" fill="${color}"/>`;
  }

  // ================= MODE 1: Two Crossing Lines =================
  const svgCross = document.getElementById('svgCross');
  const V = { x: 320, y: 200 };
  const R1 = 165;

  function atCross(deg, r){ return { x: V.x + r*Math.cos(rad(deg)), y: V.y - r*Math.sin(rad(deg)) }; }
  function arcPathCross(from, to, r){
    const steps = Math.max(2, Math.round(Math.abs(to - from) / 3));
    const pts = [];
    for (let i = 0; i <= steps; i++){ const d = from + (to - from) * i / steps; const p = atCross(d, r); pts.push(`${i === 0 ? 'M' : 'L'}${p.x.toFixed(2)} ${p.y.toFixed(2)}`); }
    return pts.join(' ');
  }

  let theta = 62; // rotating-line angle, 0-180

  function drawCross(){
    const B1 = atCross(theta, R1), B2 = atCross(theta + 180, R1);
    const fixedA = atCross(0, R1), fixedB = atCross(180, R1);
    const dir1 = { x: Math.cos(rad(theta)), y: -Math.sin(rad(theta)) };

    const m1 = Math.round(theta), m2 = 180 - m1;
    let html = '';
    // fixed (gray) horizontal line
    html += `<line x1="${fixedA.x}" y1="${fixedA.y}" x2="${fixedB.x}" y2="${fixedB.y}" stroke="${STEEL}" stroke-width="4"/>`;
    html += arrow(fixedA.x, fixedA.y, 1, 0, STEEL) + arrow(fixedB.x, fixedB.y, -1, 0, STEEL);
    // rotating (violet) line
    html += `<line x1="${B2.x}" y1="${B2.y}" x2="${B1.x}" y2="${B1.y}" stroke="${ACCENT}" stroke-width="4"/>`;
    html += arrow(B1.x, B1.y, dir1.x, dir1.y, ACCENT) + arrow(B2.x, B2.y, -dir1.x, -dir1.y, ACCENT);
    // vertex
    html += `<circle cx="${V.x}" cy="${V.y}" r="6" fill="${BONE}"/>`;
    html += `<text x="${V.x}" y="${V.y+26}" text-anchor="middle" font-size="18" fill="${BONE}" font-family="DM Mono, monospace">V</text>`;
    // four wedges: gold pair {1,3}, green pair {2,4}
    const wedges = [
      { a0:0, a1:theta, n:1, color:GOLD },
      { a0:theta, a1:180, n:2, color:GREEN },
      { a0:180, a1:180+theta, n:3, color:GOLD },
      { a0:180+theta, a1:360, n:4, color:GREEN },
    ];
    wedges.forEach(w => {
      const mid = (w.a0 + w.a1) / 2;
      const p = atCross(mid, 64);
      const measure = Math.round(w.a1 - w.a0);
      html += `<path d="${arcPathCross(w.a0, w.a1, 42)}" fill="none" stroke="${w.color}" stroke-width="3"/>`;
      html += `<text x="${p.x.toFixed(1)}" y="${p.y.toFixed(1)}" text-anchor="middle" font-size="16" fill="${w.color}" font-family="DM Mono, monospace">&ang;${w.n} ${measure}&deg;</text>`;
    });
    // handle
    html += `<circle cx="${B1.x.toFixed(1)}" cy="${B1.y.toFixed(1)}" r="12" fill="${GOLD}"/>`;
    html += `<circle id="hitCross" cx="${B1.x.toFixed(1)}" cy="${B1.y.toFixed(1)}" r="26" fill="transparent" cursor="grab"/>`;
    svgCross.innerHTML = html;

    let special = '';
    if (m1 === 90) special = '<div class="note">All four angles are right angles — the <b>Perpendicular Lines Corollary</b> of the Linear Pair Postulate + Vertical Angles Theorem.</div>';

    readout.innerHTML =
      `<div>m&ang;1 = m&ang;3 = <span class="rule">${m1}&deg;</span> &middot; <b>Vertical Angles Theorem</b> — proven from the Linear Pair Postulate, not assumed</div>` +
      `<div>m&ang;2 = m&ang;4 = <span class="rule">${m2}&deg;</span> &middot; <b>Vertical Angles Theorem</b> again — the OTHER vertical pair</div>` +
      `<div>m&ang;1 + m&ang;2 = <span class="postulate">180&deg;</span> &middot; <b>Linear Pair Postulate</b> — assumed; a straight angle IS 180&deg;</div>` +
      special;
  }

  let draggingCross = false;
  function toLocalCross(e){
    const r = svgCross.getBoundingClientRect();
    const cx = (e.touches ? e.touches[0].clientX : e.clientX) - r.left;
    const cy = (e.touches ? e.touches[0].clientY : e.clientY) - r.top;
    return { x: cx / r.width * 640, y: cy / r.height * 400 };
  }
  function angleFromPointCross(p){
    const d = Math.atan2(V.y - p.y, p.x - V.x) * 180 / Math.PI;
    const norm = ((d % 360) + 360) % 360;
    return Math.max(2, Math.min(178, norm));
  }
  function downCross(e){ if (!(e.target && e.target.id === 'hitCross')) return; draggingCross = true; moveCross(e); e.preventDefault(); }
  function moveCross(e){ if (!draggingCross) return; theta = angleFromPointCross(toLocalCross(e)); drawCross(); e.preventDefault(); }
  function upCross(){ draggingCross = false; }
  svgCross.addEventListener('pointerdown', downCross);
  window.addEventListener('pointermove', moveCross);
  window.addEventListener('pointerup', upCross);
  svgCross.addEventListener('touchstart', downCross, { passive:false });
  window.addEventListener('touchmove', moveCross, { passive:false });
  window.addEventListener('touchend', upCross);

  // ================= MODE 2: Parallel Lines + Transversal =================
  const svgParallel = document.getElementById('svgParallel');
  const C = { x: 320, y: 210 };
  const TOP_Y = 130, BOT_Y = 290;
  const HALF_GAP = (BOT_Y - TOP_Y) / 2;
  const LINE_X0 = 40, LINE_X1 = 600;

  function atP(vx, vy, deg, r){ return { x: vx + r*Math.cos(rad(deg)), y: vy - r*Math.sin(rad(deg)) }; }
  function arcPathP(vx, vy, from, to, r){
    const steps = Math.max(2, Math.round(Math.abs(to - from) / 3));
    const pts = [];
    for (let i = 0; i <= steps; i++){ const d = from + (to - from) * i / steps; const p = atP(vx, vy, d, r); pts.push(`${i === 0 ? 'M' : 'L'}${p.x.toFixed(2)} ${p.y.toFixed(2)}`); }
    return pts.join(' ');
  }

  let phi = 58; // transversal tilt, 25-155

  function buildVertexP(vx, vy, phiDeg, offset, positions){
    const arcR = 36, labelR = 58;
    const wedges = [
      { a0: 0,           a1: phiDeg,        num: 2 + offset },
      { a0: phiDeg,      a1: 180,           num: 1 + offset },
      { a0: 180,         a1: 180 + phiDeg,  num: 3 + offset },
      { a0: 180 + phiDeg, a1: 360,          num: 4 + offset },
    ];
    let out = '';
    wedges.forEach(w => {
      const measure = Math.round(w.a1 - w.a0);
      const color = measure === Math.round(phiDeg) ? GOLD : GREEN;
      const mid = (w.a0 + w.a1) / 2;
      const p = atP(vx, vy, mid, labelR);
      positions[w.num] = { x: p.x, y: p.y, color };
      out += `<path d="${arcPathP(vx, vy, w.a0, w.a1, arcR)}" fill="none" stroke="${color}" stroke-width="3"/>`;
      out += `<text x="${p.x.toFixed(1)}" y="${p.y.toFixed(1)}" text-anchor="middle" font-size="15" fill="${color}" font-family="DM Mono, monospace">&ang;${w.num} ${measure}&deg;</text>`;
    });
    return out;
  }

  function drawParallel(){
    const rTop = HALF_GAP / Math.sin(rad(phi));
    const extent = rTop + 46;
    const Mpt = atP(C.x, C.y, phi, rTop);
    const Rpt = atP(C.x, C.y, phi + 180, rTop);
    const farA = atP(C.x, C.y, phi, extent);
    const farB = atP(C.x, C.y, phi + 180, extent);
    const dirA = { x: Math.cos(rad(phi)), y: -Math.sin(rad(phi)) };
    const positions = {};

    let html = '';
    html += `<rect x="${LINE_X0}" y="${TOP_Y}" width="${LINE_X1-LINE_X0}" height="${BOT_Y-TOP_Y}" fill="${ACCENT}14"/>`;
    [TOP_Y, BOT_Y].forEach(y => {
      html += `<line x1="${LINE_X0}" y1="${y}" x2="${LINE_X1}" y2="${y}" stroke="${STEEL}" stroke-width="4"/>`;
      html += arrow(LINE_X0, y, -1, 0, STEEL) + arrow(LINE_X1, y, 1, 0, STEEL);
      [220, 420].forEach(tx => { html += `<path d="M${tx-6} ${y-7} L${tx+6} ${y} L${tx-6} ${y+7}" fill="none" stroke="${STEEL}" stroke-width="2.5"/>`; });
    });
    html += `<line x1="${farB.x}" y1="${farB.y}" x2="${farA.x}" y2="${farA.y}" stroke="${ACCENT}" stroke-width="4"/>`;
    html += arrow(farA.x, farA.y, dirA.x, dirA.y, ACCENT) + arrow(farB.x, farB.y, -dirA.x, -dirA.y, ACCENT);
    html += buildVertexP(Mpt.x, Mpt.y, phi, 0, positions);
    html += buildVertexP(Rpt.x, Rpt.y, phi, 4, positions);
    html += `<circle cx="${Mpt.x.toFixed(1)}" cy="${Mpt.y.toFixed(1)}" r="5" fill="${BONE}"/>`;
    html += `<circle cx="${Rpt.x.toFixed(1)}" cy="${Rpt.y.toFixed(1)}" r="5" fill="${BONE}"/>`;
    html += `<text x="${Mpt.x.toFixed(1)}" y="${(Mpt.y-70).toFixed(1)}" text-anchor="middle" font-size="17" fill="${BONE}" font-family="DM Mono, monospace">M</text>`;
    html += `<text x="${Rpt.x.toFixed(1)}" y="${(Rpt.y+76).toFixed(1)}" text-anchor="middle" font-size="17" fill="${BONE}" font-family="DM Mono, monospace">R</text>`;
    html += `<circle cx="${farA.x.toFixed(1)}" cy="${farA.y.toFixed(1)}" r="12" fill="${GOLD}"/>`;
    html += `<circle id="hitParallel" cx="${farA.x.toFixed(1)}" cy="${farA.y.toFixed(1)}" r="28" fill="transparent" cursor="grab"/>`;
    svgParallel.innerHTML = html;

    const g = Math.round(phi), y2 = 180 - g;
    let special = '';
    if (g === 90) special = '<div class="note">The transversal is perpendicular to both lines — a <b>corollary</b> of the Corresponding Angles Postulate: all eight angles are right angles.</div>';

    readout.innerHTML =
      `<div>&ang;1&#8776;&ang;5, &ang;2&#8776;&ang;6, &ang;3&#8776;&ang;7, &ang;4&#8776;&ang;8 &middot; <b>Corresponding Angles Postulate</b> — <span class="postulate">assumed</span>, the defining property of parallel lines</div>` +
      `<div>&ang;4 &#8776; &ang;5 = <span class="rule">${y2}&deg;</span>, &ang;3 &#8776; &ang;6 = <span class="rule">${g}&deg;</span> &middot; <b>Alternate Interior Angles Theorem</b> — proven: &ang;4&#8776;&ang;1 (Vertical Angles Theorem) then &ang;1&#8776;&ang;5 (Corresponding Angles Postulate)</div>` +
      `<div>&ang;1 &#8776; &ang;8 = <span class="rule">${g}&deg;</span>, &ang;2 &#8776; &ang;7 = <span class="rule">${y2}&deg;</span> &middot; <b>Alternate Exterior Angles Theorem</b> — proven the same way, one crossing over</div>` +
      special;
  }

  let draggingP = false;
  function toLocalP(e){
    const r = svgParallel.getBoundingClientRect();
    const cx = (e.touches ? e.touches[0].clientX : e.clientX) - r.left;
    const cy = (e.touches ? e.touches[0].clientY : e.clientY) - r.top;
    return { x: cx / r.width * 640, y: cy / r.height * 400 };
  }
  function angleFromPointP(p){
    const d = Math.atan2(C.y - p.y, p.x - C.x) * 180 / Math.PI;
    const norm = ((d % 360) + 360) % 360;
    return Math.max(25, Math.min(155, norm));
  }
  function downP(e){ if (!(e.target && e.target.id === 'hitParallel')) return; draggingP = true; moveP(e); e.preventDefault(); }
  function moveP(e){ if (!draggingP) return; phi = angleFromPointP(toLocalP(e)); drawParallel(); e.preventDefault(); }
  function upP(){ draggingP = false; }
  svgParallel.addEventListener('pointerdown', downP);
  window.addEventListener('pointermove', moveP);
  window.addEventListener('pointerup', upP);
  svgParallel.addEventListener('touchstart', downP, { passive:false });
  window.addEventListener('touchmove', moveP, { passive:false });
  window.addEventListener('touchend', upP);

  // ================= mode switching + shared actions =================
  let mode = 'cross';
  const HINTS = {
    cross: 'Drag the gold handle to rotate the violet line through vertex V. Watch which NAMED rule justifies each pair: the gold pair (&ang;1,&ang;3) and green pair (&ang;2,&ang;4) are each proven congruent by the Vertical Angles Theorem; any side-by-side pair sums to 180&deg; by the Linear Pair Postulate.',
    parallel: 'Drag the gold handle to swing the violet transversal through both parallel lines. Every pair below is named for the specific postulate or theorem that guarantees it — notice only ONE of the three is a postulate; the other two are theorems chained from it.',
  };

  function setMode(m){
    mode = m;
    [...document.querySelectorAll('#modes button')].forEach(b => b.classList.toggle('on', b.dataset.mode === m));
    document.getElementById('stageCross').hidden = m !== 'cross';
    document.getElementById('stageParallel').hidden = m !== 'parallel';
    hint.innerHTML = HINTS[m];
    if (m === 'cross') drawCross(); else drawParallel();
  }

  document.getElementById('modes').addEventListener('click', e => { const m = e.target.dataset.mode; if (m) setMode(m); });
  document.getElementById('snap90').addEventListener('click', () => { if (mode === 'cross'){ theta = 90; drawCross(); } else { phi = 90; drawParallel(); } });
  document.getElementById('randomize').addEventListener('click', () => {
    if (mode === 'cross'){ theta = Math.round(10 + Math.random() * 160); drawCross(); }
    else { phi = Math.round(30 + Math.random() * 95); drawParallel(); }
  });

  setMode('cross');
})();
</script>
</body>
</html>
