<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Angles: Measuring & Drawing — Sim</title>
<style>
  :root{--void:#0d1322;--ink:#161d31;--bone:#e8ecf3;--mist:#9aabd0;--accent:#8b5cf6;--gold:#f5c842;--border:#2a3142;--good:#7ee081}
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{background:var(--void);color:var(--bone);font-family:Inter,system-ui,sans-serif;display:flex;flex-direction:column;min-height:100%}
  header{padding:2vh 4vw;border-bottom:1px solid var(--border);background:var(--ink)}
  .eyebrow{font-family:"DM Mono",ui-monospace,monospace;letter-spacing:.18em;text-transform:uppercase;font-size:12px;color:var(--accent)}
  h1{font-family:Fraunces,Georgia,serif;font-style:italic;font-weight:600;font-size:clamp(20px,3vw,30px);margin-top:.3rem}
  main{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1.6vh;padding:3vh 4vw}
  .stage{width:100%;max-width:720px;aspect-ratio:16/11;background:var(--ink);border:1px solid var(--border);border-radius:16px;touch-action:none}
  svg{width:100%;height:100%;display:block}
  .controls{display:flex;gap:.6rem;flex-wrap:wrap;justify-content:center}
  button{font-family:"DM Mono",ui-monospace,monospace;font-size:14px;background:var(--ink);color:var(--bone);border:1px solid var(--border);border-radius:999px;padding:.6rem 1.2rem;cursor:pointer}
  button.on{border-color:var(--accent);color:var(--accent)}
  .readout{font-family:"DM Mono",ui-monospace,monospace;font-size:clamp(16px,2.4vw,22px);color:var(--mist);text-align:center;min-height:1.6em}
  .readout b{color:var(--gold);font-size:1.15em}
  .readout .match{color:var(--good);font-weight:bold}
  .hint{color:var(--mist);font-size:14px;max-width:56ch;text-align:center}
</style>
</head>
<body>
  <header>
    <div class="eyebrow">Geometry · Lesson 3 · sim</div>
    <h1>Drag the ray. Read the degree. Hit the target.</h1>
  </header>
  <main>
    <div class="controls" id="modes">
      <button data-mode="measure" class="on">Measure</button>
      <button data-mode="draw">Draw to Target</button>
    </div>
    <div class="stage"><svg viewBox="0 0 640 400" id="svg"></svg></div>
    <div class="readout" id="readout"></div>
    <div class="controls" id="actions" hidden>
      <button id="newTarget">New Target</button>
    </div>
    <p class="hint" id="hint"></p>
  </main>
<script>
(() => {
  const NS = 'http://www.w3.org/2000/svg';
  const svg = document.getElementById('svg');
  const readout = document.getElementById('readout');
  const hint = document.getElementById('hint');
  const actions = document.getElementById('actions');

  const V = { x: 320, y: 350 };   // vertex
  const R = 220;                  // ray length
  const RIM = R + 20;             // protractor rim radius

  function make(tag, attrs){ const n=document.createElementNS(NS,tag); for(const k in attrs) n.setAttribute(k,attrs[k]); svg.appendChild(n); return n; }
  const rad = d => d * Math.PI / 180;
  // point at math-angle deg (0 = pointing right along +x, 90 = straight up); y-up convention
  const at = (deg, r) => ({ x: V.x + r*Math.cos(rad(deg)), y: V.y - r*Math.sin(rad(deg)) });

  // ---- static protractor body: rim, ticks, dual-scale labels ----
  const rimPts = [];
  for (let d = 0; d <= 180; d += 2) rimPts.push(at(d, RIM));
  make('polyline', { points: rimPts.map(p => `${p.x},${p.y}`).join(' '), fill:'none', stroke:'#2a3142', 'stroke-width':2 });
  make('line', { x1: V.x - RIM, y1: V.y, x2: V.x + RIM, y2: V.y, stroke:'#2a3142', 'stroke-width':2 });

  for (let d = 0; d <= 180; d += 10) {
    const major = d % 30 === 0;
    const p1 = at(d, RIM), p2 = at(d, major ? RIM - 16 : RIM - 8);
    make('line', { x1:p1.x, y1:p1.y, x2:p2.x, y2:p2.y, stroke: major ? '#9aabd0' : '#3a4258', 'stroke-width': major ? 2 : 1 });
    if (major) {
      const lp = at(d, RIM + 18);
      const t1 = make('text', { x:lp.x, y:lp.y - 3, 'text-anchor':'middle', 'font-size':13, fill:'#c7cfe4', 'font-family':'DM Mono, monospace' });
      t1.textContent = `${d}°`;
      const t2 = make('text', { x:lp.x, y:lp.y + 12, 'text-anchor':'middle', 'font-size':10, fill:'#5c6685', 'font-family':'DM Mono, monospace' });
      t2.textContent = `(${180 - d}°)`;
    }
  }

  // ---- small angle arc (updates live) ----
  const arc = make('path', { fill:'none', stroke:'#f5c842', 'stroke-width':3 });

  // ---- fixed baseline ray VA (0°) ----
  const A = at(0, R);
  make('line', { x1:V.x, y1:V.y, x2:A.x, y2:A.y, stroke:'#8b5cf6', 'stroke-width':5, 'stroke-linecap':'round' });
  make('circle', { cx:A.x, cy:A.y, r:7, fill:'#8b5cf6' });
  const lblA = make('text', { x:A.x + 18, y:A.y + 5, 'font-size':20, fill:'#e8ecf3', 'font-family':'DM Mono, monospace' }); lblA.textContent = 'A';

  // ---- vertex ----
  make('circle', { cx:V.x, cy:V.y, r:8, fill:'#8b5cf6' });
  const lblV = make('text', { x:V.x, y:V.y + 28, 'text-anchor':'middle', 'font-size':20, fill:'#e8ecf3', 'font-family':'DM Mono, monospace' }); lblV.textContent = 'V';

  // ---- target ray (Draw to Target mode) ----
  const targetLine = make('line', { stroke:'#7ee081', 'stroke-width':3, 'stroke-dasharray':'6 6', opacity:0 });
  const targetLbl = make('text', { 'font-size':14, fill:'#7ee081', 'font-family':'DM Mono, monospace', 'text-anchor':'middle', opacity:0 });

  // ---- draggable ray VB ----
  const rayB = make('line', { stroke:'#8b5cf6', 'stroke-width':5, 'stroke-linecap':'round' });
  const lblB = make('text', { 'font-size':20, fill:'#e8ecf3', 'font-family':'DM Mono, monospace', 'text-anchor':'middle' }); lblB.textContent = 'B';
  const handle = make('circle', { r:12, fill:'#f5c842' });
  const hitB = make('circle', { r:26, fill:'transparent', cursor:'grab' });

  let theta = 55;      // current draggable angle, 0-180
  let mode = 'measure';
  let target = 60;

  function arcPath(from, to, r){
    const steps = Math.max(2, Math.round(Math.abs(to - from) / 3));
    const pts = [];
    for (let i = 0; i <= steps; i++){ const d = from + (to - from) * i / steps; const p = at(d, r); pts.push(`${i === 0 ? 'M' : 'L'}${p.x} ${p.y}`); }
    return pts.join(' ');
  }

  function draw(){
    const B = at(theta, R);
    rayB.setAttribute('x1', V.x); rayB.setAttribute('y1', V.y);
    rayB.setAttribute('x2', B.x); rayB.setAttribute('y2', B.y);
    handle.setAttribute('cx', B.x); handle.setAttribute('cy', B.y);
    hitB.setAttribute('cx', B.x); hitB.setAttribute('cy', B.y);
    lblB.setAttribute('x', B.x + (theta > 90 ? -18 : 18));
    lblB.setAttribute('y', B.y - 10);
    arc.setAttribute('d', arcPath(0, theta, 50));

    const deg = Math.round(theta);
    let note = '';
    if (deg === 90) note = ' — a right angle!';
    else if (deg === 180) note = ' — a straight angle!';
    else if (deg === 0) note = ' — the rays overlap (0°)';

    if (mode === 'measure') {
      readout.innerHTML = `m&ang;AVB = <b>${deg}&deg;</b>${note}`;
      targetLine.setAttribute('opacity', 0);
      targetLbl.setAttribute('opacity', 0);
      actions.hidden = true;
    } else {
      const hit = Math.abs(deg - target) <= 2;
      const tp = at(target, RIM + 6);
      const tp2 = at(target, RIM + 26);
      targetLine.setAttribute('x1', V.x); targetLine.setAttribute('y1', V.y);
      targetLine.setAttribute('x2', tp.x); targetLine.setAttribute('y2', tp.y);
      targetLine.setAttribute('opacity', 0.9);
      targetLbl.setAttribute('x', tp2.x); targetLbl.setAttribute('y', tp2.y);
      targetLbl.textContent = `target ${target}°`;
      targetLbl.setAttribute('opacity', 0.9);
      readout.innerHTML = hit
        ? `<span class="match">Match! m&ang;AVB = ${deg}&deg; ≈ target ${target}&deg;</span>`
        : `Draw m&ang;XYZ = <b>${target}&deg;</b> &middot; you're at <b>${deg}&deg;</b>`;
      actions.hidden = false;
    }
  }

  function setMode(m){
    mode = m;
    [...document.querySelectorAll('#modes button')].forEach(b => b.classList.toggle('on', b.dataset.mode === m));
    hint.textContent = m === 'measure'
      ? "Drag the gold handle on ray VB. Ray VA stays fixed at 0°. Read m∠AVB where the ray crosses the scale — nearest whole degree. Watch which of the two scales reads 0° at your baseline."
      : 'A dashed green ray marks a target measure. Drag ray VB to match it within a degree or two — this is exactly what you do on paper with a real protractor.';
    draw();
  }

  function newTarget(){
    target = Math.round((10 + Math.random() * 160) / 5) * 5; // multiple of 5, between 10 and 170
    draw();
  }

  // ---- drag handling (grab the handle, drag anywhere) ----
  let dragging = false;
  function toLocal(e){
    const r = svg.getBoundingClientRect();
    const cx = (e.touches ? e.touches[0].clientX : e.clientX) - r.left;
    const cy = (e.touches ? e.touches[0].clientY : e.clientY) - r.top;
    return { x: cx / r.width * 640, y: cy / r.height * 400 };
  }
  function angleFromPoint(p){
    const d = Math.atan2(V.y - p.y, p.x - V.x) * 180 / Math.PI;
    return Math.max(0, Math.min(180, d));
  }
  function down(e){ dragging = true; move(e); e.preventDefault(); }
  function move(e){ if (!dragging) return; theta = angleFromPoint(toLocal(e)); draw(); e.preventDefault(); }
  function up(){ dragging = false; }

  hitB.addEventListener('pointerdown', down);
  window.addEventListener('pointermove', move);
  window.addEventListener('pointerup', up);
  hitB.addEventListener('touchstart', down, { passive:false });
  window.addEventListener('touchmove', move, { passive:false });
  window.addEventListener('touchend', up);

  document.getElementById('modes').addEventListener('click', e => { const m = e.target.dataset.mode; if (m) setMode(m); });
  document.getElementById('newTarget').addEventListener('click', newTarget);

  newTarget();
  setMode('measure');
})();
</script>
</body>
</html>
