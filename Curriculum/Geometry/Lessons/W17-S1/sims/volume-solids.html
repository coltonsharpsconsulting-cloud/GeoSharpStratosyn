<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Volume of Pyramids, Cones, Prisms &amp; Spheres — Sim</title>
<style>
  :root{--void:#0d1322;--ink:#161d31;--bone:#e8ecf3;--mist:#9aabd0;--accent:#8b5cf6;--gold:#f5c842;--cyan:#00e5ff;--slant:#ff8a5c;--border:#2a3142;--good:#7ee081}
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{background:var(--void);color:var(--bone);font-family:Inter,system-ui,sans-serif;display:flex;flex-direction:column;min-height:100%}
  header{padding:2vh 4vw;border-bottom:1px solid var(--border);background:var(--ink)}
  .eyebrow{font-family:"DM Mono",ui-monospace,monospace;letter-spacing:.18em;text-transform:uppercase;font-size:12px;color:var(--accent)}
  h1{font-family:Fraunces,Georgia,serif;font-style:italic;font-weight:600;font-size:clamp(20px,3vw,30px);margin-top:.3rem}
  main{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1.6vh;padding:3vh 4vw}
  .stage{width:100%;max-width:720px;aspect-ratio:16/11;background:var(--ink);border:1px solid var(--border);border-radius:16px;touch-action:none;overflow:hidden}
  svg{width:100%;height:100%;display:block}
  .controls{display:flex;gap:.6rem;flex-wrap:wrap;justify-content:center}
  button{font-family:"DM Mono",ui-monospace,monospace;font-size:14px;background:var(--ink);color:var(--bone);border:1px solid var(--border);border-radius:999px;padding:.6rem 1.2rem;cursor:pointer}
  button.on{border-color:var(--accent);color:var(--accent)}
  .sliders{width:100%;max-width:560px;display:flex;flex-direction:column;gap:.7rem}
  .slider-row{display:flex;align-items:center;gap:.8rem}
  .slider-row label{font-family:"DM Mono",ui-monospace,monospace;font-size:13px;color:var(--mist);width:170px;flex-shrink:0}
  .slider-row label b{color:var(--gold)}
  .slider-row.cyan label b{color:var(--cyan)}
  input[type=range]{flex:1;accent-color:var(--gold)}
  .slider-row.cyan input[type=range]{accent-color:var(--cyan)}
  .readout{font-family:"DM Mono",ui-monospace,monospace;font-size:clamp(13px,2vw,18px);color:var(--mist);text-align:center;min-height:4.5em;line-height:1.55}
  .readout b{color:var(--gold);font-size:1.1em}
  .readout .frac{background:rgba(245,200,66,.16);color:var(--gold);padding:.05em .4em;border-radius:5px;font-weight:700}
  .hint{color:var(--mist);font-size:14px;max-width:62ch;text-align:center}
</style>
</head>
<body>
  <header>
    <div class="eyebrow">Geometry · Lesson 15 · sim</div>
    <h1>Choose a solid. Drag its dimensions. Watch the volume fill in.</h1>
  </header>
  <main>
    <div class="controls" id="modes">
      <button data-mode="prism" class="on">Prism</button>
      <button data-mode="pyramid">Pyramid</button>
      <button data-mode="cone">Cone</button>
      <button data-mode="sphere">Sphere</button>
    </div>
    <div class="stage"><svg viewBox="0 0 640 400" id="svg"></svg></div>

    <div class="sliders" id="prismSliders">
      <div class="slider-row"><label>base b = <b id="pbVal">6</b></label><input type="range" id="pbRange" min="1" max="10" step="1" value="6"></div>
      <div class="slider-row"><label>triangle height = <b id="ptVal">4</b></label><input type="range" id="ptRange" min="1" max="10" step="1" value="4"></div>
      <div class="slider-row cyan"><label>length L = <b id="pLVal">7</b></label><input type="range" id="pLRange" min="1" max="10" step="1" value="7"></div>
    </div>
    <div class="sliders" id="pyramidSliders" hidden>
      <div class="slider-row"><label>base side s = <b id="ysVal">5</b></label><input type="range" id="ysRange" min="1" max="10" step="1" value="5"></div>
      <div class="slider-row cyan"><label>altitude h = <b id="yhVal">7</b></label><input type="range" id="yhRange" min="1" max="10" step="1" value="7"></div>
    </div>
    <div class="sliders" id="coneSliders" hidden>
      <div class="slider-row"><label>radius r = <b id="crVal">3</b></label><input type="range" id="crRange" min="1" max="6" step="1" value="3"></div>
      <div class="slider-row cyan"><label>altitude h = <b id="chVal">7</b></label><input type="range" id="chRange" min="1" max="10" step="1" value="7"></div>
    </div>
    <div class="sliders" id="sphereSliders" hidden>
      <div class="slider-row"><label>radius r = <b id="srVal">4</b></label><input type="range" id="srRange" min="1" max="6" step="1" value="4"></div>
    </div>

    <div class="readout" id="readout"></div>
    <p class="hint" id="hint"></p>
  </main>
<script>
(() => {
  const NS = 'http://www.w3.org/2000/svg';
  const svg = document.getElementById('svg');
  const readout = document.getElementById('readout');
  const hint = document.getElementById('hint');
  const groups = {
    prism: document.getElementById('prismSliders'),
    pyramid: document.getElementById('pyramidSliders'),
    cone: document.getElementById('coneSliders'),
    sphere: document.getElementById('sphereSliders')
  };

  function make(tag, attrs){ const n=document.createElementNS(NS,tag); for(const k in attrs) n.setAttribute(k,attrs[k]); svg.appendChild(n); return n; }
  function clear(){ while (svg.firstChild) svg.removeChild(svg.firstChild); }
  function fmt(n){ return (Math.round(n*100)/100).toString().replace(/\.?0+$/,'').replace(/^$/,'0'); }
  function fmt2(n){ return (Math.round(n*100)/100).toFixed(2); }

  const UNIT = 24;                 // px per unit
  const DEPTH_ANGLE = 35 * Math.PI / 180; // oblique depth angle
  const DEPTH_SCALE = 0.62;         // foreshorten the depth axis (cabinet-style projection)

  let mode = 'prism';
  let PB = 6, PT = 4, PL = 7;   // prism: triangle base, triangle height, prism length
  let YS = 5, YH = 7;            // pyramid: base side, altitude
  let CR = 3, CH = 7;             // cone: radius, altitude
  let SR = 4;                     // sphere: radius

  function drawGrid(){
    const g = make('g', {});
    for (let x = 0; x <= 640; x += 20){
      const ln = document.createElementNS(NS,'line');
      ln.setAttribute('x1',x); ln.setAttribute('y1',0); ln.setAttribute('x2',x); ln.setAttribute('y2',400);
      ln.setAttribute('stroke','#1c2338'); ln.setAttribute('stroke-width', x % 100 === 0 ? 1.2 : 0.6);
      g.appendChild(ln);
    }
    for (let y = 0; y <= 400; y += 20){
      const ln = document.createElementNS(NS,'line');
      ln.setAttribute('x1',0); ln.setAttribute('y1',y); ln.setAttribute('x2',640); ln.setAttribute('y2',y);
      ln.setAttribute('stroke','#1c2338'); ln.setAttribute('stroke-width', y % 100 === 0 ? 1.2 : 0.6);
      g.appendChild(ln);
    }
  }

  function poly(pts, fill, stroke, dash){
    const attrs = { points: pts.map(p => `${p.x},${p.y}`).join(' '), fill, stroke, 'stroke-width': 2.5, 'stroke-linejoin':'round' };
    if (dash) attrs['stroke-dasharray'] = dash;
    return make('polygon', attrs);
  }

  function lineSeg(a, b, stroke, width, dash){
    const attrs = { x1:a.x, y1:a.y, x2:b.x, y2:b.y, stroke, 'stroke-width': width || 2 };
    if (dash) attrs['stroke-dasharray'] = dash;
    return make('line', attrs);
  }

  function label(x, y, text, opts){
    const t = make('text', Object.assign({ x, y, 'text-anchor':'middle', 'font-family':'DM Mono, monospace', 'font-size':15, fill:'#e8ecf3' }, opts||{}));
    t.textContent = text;
    return t;
  }

  // ---------------------------------------------------------------- PRISM
  // A right-triangle base (legs PB, PT), extruded back by length PL.
  function drawPrism(){
    const O = { x: 190, y: 320 };           // right-angle corner, front
    const P1 = { x: O.x + PB*UNIT, y: O.y };            // along the base leg
    const P2 = { x: O.x, y: O.y - PT*UNIT };            // up the vertical leg
    const dx = PL*UNIT*DEPTH_SCALE*Math.cos(DEPTH_ANGLE);
    const dy = -PL*UNIT*DEPTH_SCALE*Math.sin(DEPTH_ANGLE);
    const Ob = { x: O.x + dx, y: O.y + dy };
    const P1b = { x: P1.x + dx, y: P1.y + dy };
    const P2b = { x: P2.x + dx, y: P2.y + dy };

    // hidden back triangle + hidden lateral edge (dashed)
    lineSeg(Ob, P1b, '#3a4258', 1.5, '4 4');
    lineSeg(P1b, P2b, '#3a4258', 1.5, '4 4');
    lineSeg(P2b, Ob, '#3a4258', 1.5, '4 4');
    lineSeg(O, Ob, '#3a4258', 1.5, '4 4');

    // visible lateral (hypotenuse) face
    poly([P1, P2, P2b, P1b], '#8b5cf655', '#8b5cf6');
    // visible front triangular face, drawn last (on top)
    poly([O, P1, P2], '#8b5cf680', '#8b5cf6');

    // right-angle mark at O
    make('polyline', { points:`${O.x},${O.y-10} ${O.x+10},${O.y-10} ${O.x+10},${O.y}`, fill:'none', stroke:'#e8ecf3', 'stroke-width':1.5 });

    [O, P1, P2, P1b, P2b].forEach(p => make('circle', { cx:p.x, cy:p.y, r:4, fill:'#f5c842' }));

    label((O.x + P1.x)/2, O.y + 24, `b = ${fmt(PB)}`, { fill:'#f5c842' });
    label(O.x - 20, (O.y + P2.y)/2, `${fmt(PT)}`, { fill:'#f5c842', 'text-anchor':'end' });
    label((P1.x + P1b.x)/2 + 14, (P1.y + P1b.y)/2 - 4, `L = ${fmt(PL)}`, { fill:'#00e5ff' });

    const base = 0.5 * PB * PT, vol = base * PL;
    readout.innerHTML = `Triangular prism &middot; b = <b>${fmt(PB)}</b> &middot; triangle height = <b>${fmt(PT)}</b> &middot; L = <b>${fmt(PL)}</b><br>` +
      `base area = &frac12;&middot;b&middot;height = &frac12; &times; ${fmt(PB)} &times; ${fmt(PT)} = ${fmt(base)} sq units<br>` +
      `V = base area &times; L = ${fmt(base)} &times; ${fmt(PL)} = <b>${fmt(vol)}</b> cubic units &mdash; no &#8531; ! sides run straight back`;
  }

  // -------------------------------------------------------------- PYRAMID
  // Square base drawn as an oblique parallelogram; apex directly above center.
  function drawPyramid(){
    const baseY = 320;
    const cx = 320;
    const half = YS*UNIT/2;
    const A = { x: cx - half, y: baseY };
    const B = { x: cx + half, y: baseY };
    const dx = YS*UNIT*DEPTH_SCALE*Math.cos(DEPTH_ANGLE);
    const dy = -YS*UNIT*DEPTH_SCALE*Math.sin(DEPTH_ANGLE);
    const A2 = { x: A.x + dx, y: A.y + dy };
    const B2 = { x: B.x + dx, y: B.y + dy };
    const center = { x: (A.x + B.x + A2.x + B2.x)/4, y: (A.y + B.y + A2.y + B2.y)/4 };
    const apex = { x: center.x, y: baseY - YH*UNIT };

    // faint base plane
    poly([A, B, B2, A2], '#8b5cf61a', '#3a4258');

    // hidden back edges (dashed): far side + far lateral edge
    lineSeg(A, A2, '#3a4258', 1.5, '4 4');
    lineSeg(A2, B2, '#3a4258', 1.5, '4 4');
    lineSeg(apex, A2, '#3a4258', 1.5, '4 4');

    // visible right lateral face, then front lateral face on top
    poly([apex, B, B2], '#8b5cf655', '#8b5cf6');
    poly([apex, A, B], '#8b5cf680', '#8b5cf6');

    // altitude (dashed cyan) from base center straight to apex
    lineSeg(center, apex, '#00e5ff', 2, '6 5');
    // slant height (solid) apex to midpoint of front base edge A-B
    const midAB = { x: (A.x+B.x)/2, y: (A.y+B.y)/2 };
    lineSeg(apex, midAB, '#ff8a5c', 2.5);

    [A, B, B2, apex].forEach(p => make('circle', { cx:p.x, cy:p.y, r:4, fill:'#f5c842' }));

    label(apex.x, apex.y - 14, 'apex', { fill:'#f5c842' });
    label((A.x + B.x)/2, A.y + 24, `s = ${fmt(YS)}`, { fill:'#f5c842' });
    label(center.x + 18, (center.y + apex.y)/2, `h = ${fmt(YH)}`, { fill:'#00e5ff', 'text-anchor':'start' });
    label((apex.x + midAB.x)/2 - 34, (apex.y + midAB.y)/2, `slant`, { fill:'#ff8a5c', 'text-anchor':'end' });

    const base = YS * YS, vol = (1/3) * base * YH;
    readout.innerHTML = `Square pyramid &middot; s = <b>${fmt(YS)}</b> &middot; altitude h = <b>${fmt(YH)}</b><br>` +
      `base area = s&sup2; = ${fmt(YS)}&sup2; = ${fmt(base)} sq units<br>` +
      `V = <span class="frac">&#8531;</span> &times; base area &times; height = &#8531; &times; ${fmt(base)} &times; ${fmt(YH)} = <b>${fmt(vol)}</b> cubic units`;
  }

  // ------------------------------------------------------------------ CONE
  // apex on top, circular base at the bottom; slant edge (right side) doubles as slant height.
  function drawCone(){
    const cx = 320;
    const rx = CR*UNIT, ry = CR*UNIT*0.4;
    const apex = { x: cx, y: 80 };
    const botY = apex.y + CH*UNIT;
    const baseCenter = { x: cx, y: botY };

    // hidden back arc of base
    make('path', { d:`M ${cx-rx} ${botY} A ${rx} ${ry} 0 0 1 ${cx+rx} ${botY}`, fill:'none', stroke:'#3a4258', 'stroke-width':1.5, 'stroke-dasharray':'4 4' });

    // filled cone silhouette: apex -> left base point -> front arc -> right base point -> apex
    make('path', { d:`M ${apex.x} ${apex.y} L ${cx-rx} ${botY} A ${rx} ${ry} 0 0 0 ${cx+rx} ${botY} Z`, fill:'#8b5cf670', stroke:'none' });

    // left slant edge (plain), right slant edge highlighted as the "slant height"
    lineSeg(apex, { x: cx-rx, y: botY }, '#8b5cf6', 2.5);
    lineSeg(apex, { x: cx+rx, y: botY }, '#ff8a5c', 2.5);

    // altitude (dashed cyan) apex straight down to base center
    lineSeg(apex, baseCenter, '#00e5ff', 2, '6 5');
    // radius (gold) along the base
    lineSeg(baseCenter, { x: cx+rx, y: botY }, '#f5c842', 2.5);

    make('circle', { cx:apex.x, cy:apex.y, r:5, fill:'#f5c842' });
    make('circle', { cx:baseCenter.x, cy:baseCenter.y, r:4, fill:'#f5c842' });
    make('circle', { cx:cx+rx, cy:botY, r:4, fill:'#f5c842' });

    label(apex.x, apex.y - 12, 'apex', { fill:'#f5c842' });
    label(cx + rx/2, botY + 22, `r = ${fmt(CR)}`, { fill:'#f5c842' });
    label(cx - 18, (apex.y + botY)/2, `h = ${fmt(CH)}`, { fill:'#00e5ff', 'text-anchor':'end' });
    label(cx + rx/2 + 26, (apex.y + botY)/2 - 6, 'slant', { fill:'#ff8a5c', 'text-anchor':'start' });

    const base = Math.PI * CR * CR, vol = (1/3) * base * CH;
    readout.innerHTML = `Cone &middot; r = <b>${fmt(CR)}</b> &middot; altitude h = <b>${fmt(CH)}</b><br>` +
      `base area = &pi;r&sup2; = &pi; &times; ${fmt(CR)}&sup2; = ${fmt(CR*CR)}&pi; &asymp; ${fmt(base)} sq units<br>` +
      `V = <span class="frac">&#8531;</span> &times; &pi;r&sup2; &times; height = &#8531; &times; ${fmt(CR*CR)}&pi; &times; ${fmt(CH)} = ${fmt(CR*CR*CH/3)}&pi; &asymp; <b>${fmt(vol)}</b> cubic units`;
  }

  // ---------------------------------------------------------------- SPHERE
  function drawSphere(){
    const cx = 320, cy = 220;
    const r = SR*UNIT;

    const grad = make('radialGradient', { id:'sphereGrad', cx:'38%', cy:'32%', r:'70%' });
    const s1 = make('stop', { offset:'0%', 'stop-color':'#a78bfa' }); grad.appendChild(s1);
    const s2 = make('stop', { offset:'100%', 'stop-color':'#5b3fa0' }); grad.appendChild(s2);

    make('circle', { cx, cy, r, fill:'url(#sphereGrad)', stroke:'#8b5cf6', 'stroke-width':2.5 });
    // equator ellipse to suggest roundness
    make('ellipse', { cx, cy, rx:r, ry:r*0.28, fill:'none', stroke:'#3a4258', 'stroke-width':1.5, 'stroke-dasharray':'5 5' });

    // radius line
    lineSeg({x:cx,y:cy}, {x:cx+r,y:cy}, '#f5c842', 3);
    make('circle', { cx, cy, r:4, fill:'#f5c842' });
    make('circle', { cx:cx+r, cy, r:5, fill:'#f5c842' });
    label(cx + r/2, cy - 12, `r = ${fmt(SR)}`, { fill:'#f5c842' });

    const vol = (4/3) * Math.PI * SR*SR*SR;
    const coeff = fmt((4/3)*SR*SR*SR);
    readout.innerHTML = `Sphere &middot; r = <b>${fmt(SR)}</b> &middot; no base, no height<br>` +
      `V = <span class="frac">4&frasl;3</span> &times; &pi; &times; r&sup3; = 4&frasl;3 &times; &pi; &times; ${fmt(SR)}&sup3; = ${coeff}&pi;<br>` +
      `&asymp; <b>${fmt2(vol)}</b> cubic units (rounded to the nearest hundredth)`;
  }

  function draw(){
    clear();
    drawGrid();
    if (mode === 'prism') drawPrism();
    else if (mode === 'pyramid') drawPyramid();
    else if (mode === 'cone') drawCone();
    else drawSphere();
  }

  const hints = {
    prism: 'Drag the triangle\'s base and height, and the prism\'s length. Watch the base area (½·b·height) get computed first, then multiplied straight through by the length — no ⅓, because the sides run straight back to a congruent, parallel triangle, never to a point.',
    pyramid: 'Drag the base side and the altitude. Watch the base area get computed first, exactly like a prism — then multiplied by ⅓ before it ever becomes the volume. The dashed cyan line is the altitude (used for volume); the solid orange line is the slant height (a face\'s height, never used for volume).',
    cone: 'Drag the radius and the altitude. The base is a circle, so its area is πr² — watch the radius get squared before it ever multiplies by the height, and watch the ⅓ join in exactly where it did for the pyramid. The orange edge is the slant height; the dashed cyan line is the altitude that actually belongs in the formula.',
    sphere: 'Drag the radius. Notice there is no height slider at all — a sphere has no flat base to multiply by a height, so its formula, 4⁄3·π·r³, stands completely on its own.'
  };

  function setMode(m){
    mode = m;
    [...document.querySelectorAll('#modes button')].forEach(b => b.classList.toggle('on', b.dataset.mode === m));
    Object.keys(groups).forEach(k => groups[k].hidden = k !== m);
    hint.textContent = hints[m];
    draw();
  }

  document.getElementById('pbRange').addEventListener('input', e => { PB = +e.target.value; document.getElementById('pbVal').textContent = fmt(PB); draw(); });
  document.getElementById('ptRange').addEventListener('input', e => { PT = +e.target.value; document.getElementById('ptVal').textContent = fmt(PT); draw(); });
  document.getElementById('pLRange').addEventListener('input', e => { PL = +e.target.value; document.getElementById('pLVal').textContent = fmt(PL); draw(); });

  document.getElementById('ysRange').addEventListener('input', e => { YS = +e.target.value; document.getElementById('ysVal').textContent = fmt(YS); draw(); });
  document.getElementById('yhRange').addEventListener('input', e => { YH = +e.target.value; document.getElementById('yhVal').textContent = fmt(YH); draw(); });

  document.getElementById('crRange').addEventListener('input', e => { CR = +e.target.value; document.getElementById('crVal').textContent = fmt(CR); draw(); });
  document.getElementById('chRange').addEventListener('input', e => { CH = +e.target.value; document.getElementById('chVal').textContent = fmt(CH); draw(); });

  document.getElementById('srRange').addEventListener('input', e => { SR = +e.target.value; document.getElementById('srVal').textContent = fmt(SR); draw(); });

  document.getElementById('modes').addEventListener('click', e => { const m = e.target.dataset.mode; if (m) setMode(m); });

  setMode('prism');
})();
</script>
</body>
</html>
